name: Sync InfernoDrift Peer

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: infernodrift-peer-sync-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-peer:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip peer-sync]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node scripts/sync-peer-repo.mjs
        env:
          INFERNODRIFT_SYNC_TOKEN: ${{ secrets.INFERNODRIFT_SYNC_TOKEN }}
          GITHUB_EVENT_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
