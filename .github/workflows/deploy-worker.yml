name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "migrations/**"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run worker:check
      - name: Check Cloudflare secrets
        id: cloudflare-secrets
        run: |
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_D1_DATABASE_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Cloudflare deploy skipped::Add CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN, and CLOUDFLARE_D1_DATABASE_ID repository secrets to deploy the live backend."
          fi
      - name: Configure D1 binding
        if: steps.cloudflare-secrets.outputs.available == 'true'
        run: node -e "const fs=require('fs'); const p='wrangler.jsonc'; fs.writeFileSync(p, fs.readFileSync(p,'utf8').replace('00000000-0000-0000-0000-000000000000', process.env.CLOUDFLARE_D1_DATABASE_ID));"
      - name: Apply D1 migrations
        if: steps.cloudflare-secrets.outputs.available == 'true'
        run: npx wrangler d1 migrations apply infernodrift4 --remote
      - name: Deploy Worker
        if: steps.cloudflare-secrets.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
      - name: Configure feedback email secret
        if: steps.cloudflare-secrets.outputs.available == 'true' && env.RESEND_API_KEY != ''
        run: printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY
