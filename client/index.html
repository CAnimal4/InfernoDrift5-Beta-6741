<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#120a08" />
    <meta name="description" content="Outrun the end of the road in InfernoDrift: Afterburn." />
    <title>InfernoDrift: Afterburn</title>
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <script>
      window.__INFERNO_AFTERBURN__ = true;
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .getRegistrations()
            .then((registrations) =>
              Promise.all(registrations.map((worker) => worker.unregister())),
            )
            .catch(() => undefined);
        });
      }
      if ("caches" in window) {
        window.addEventListener("load", () => {
          caches
            .keys()
            .then((keys) =>
              Promise.all(
                keys
                  .filter((key) => key.startsWith("infernodrift4-"))
                  .map((key) => caches.delete(key)),
              ),
            )
            .catch(() => undefined);
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
