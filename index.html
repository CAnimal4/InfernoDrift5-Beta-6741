        window.addEventListener("load", () => {
          navigator.serviceWorker

            .then((registrations) =>
              Promise.all(registrations.map((worker) => worker.unregister())),

            .catch(() => undefined);

          caches

                  .map((key) => caches.delete(key)),
              ),
            )
            .catch(() => undefined);
        });
